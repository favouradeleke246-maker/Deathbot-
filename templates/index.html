<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>☠️ SpectraX</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💀</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Instrument+Serif&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0000;
            color: #ffcccc;
            padding: 20px;
            min-height: 100vh;
            background-image: radial-gradient(circle at 20% 30%, #1a0000 0%, #0a0000 90%);
        }
        .font-dancing { font-family: 'Dancing Script', cursive; }
        .font-instrument { font-family: 'Instrument Serif', serif; }
        .text-glow-red {
            text-shadow: 0 0 30px #ff000088, 0 0 60px #ff000044;
        }
        .glass-card {
            background: rgba(20, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid #990000;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(255,0,0,0.2);
        }
        .glass-header {
            background: rgba(180, 0, 0, 0.3);
            padding: 16px 24px;
            border-bottom: 2px solid #ff0000;
        }
        .glass-header h2 {
            font-family: 'Instrument Serif', serif;
            color: #ff6666;
            letter-spacing: 1px;
        }
        .stat-number {
            font-family: 'Instrument Serif', serif;
            font-size: 2.4rem;
            color: #ff3333;
            text-shadow: 0 0 20px #ff000088;
        }
        .stat-label {
            color: #ff9999;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 2px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        thead th {
            background: rgba(200,0,0,0.2);
            color: #ff6666;
            padding: 12px 16px;
            border-bottom: 2px solid #990000;
        }
        tbody td {
            padding: 12px 16px;
            border-bottom: 1px solid #330000;
            color: #ffcccc;
        }
        tbody tr:hover {
            background: rgba(255,0,0,0.1);
        }
        .progress {
            height: 6px;
            background: #330000;
            border-radius: 4px;
            width: 80px;
            display: inline-block;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #660000, #ff0000);
            border-radius: 4px;
        }
        .badge {
            background: #660000;
            color: #ffcccc;
            padding: 3px 8px;
            border-radius: 20px;
            font-size: 0.7rem;
        }
        .map-container {
            height: 340px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #660000;
        }
        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }
        .pulse {
            animation: pulse 2s infinite;
        }
    </style>
</head>
<body>
    <div class="container" style="max-width:1400px;margin:0 auto;">
        <div class="flex items-center justify-between mb-8">
            <div class="flex items-center gap-3">
                <span class="font-dancing text-4xl text-red-500 text-glow-red">☠️ SpectraX</span>
                <span class="text-red-700 text-sm hidden md:inline">| death control</span>
            </div>
            <div class="text-red-500 text-xs tracking-widest pulse">
                <span class="inline-block w-2 h-2 bg-red-600 rounded-full mr-2"></span> LETHAL
            </div>
        </div>

        <!-- Stats -->
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-6 mb-8">
            <div class="glass-card p-4">
                <div class="stat-number" id="totalTargets">0</div>
                <div class="stat-label">Prey Count</div>
            </div>
            <div class="glass-card p-4">
                <div class="stat-number" id="avgRisk">0</div>
                <div class="stat-label">Risk Level</div>
            </div>
            <div class="glass-card p-4">
                <div class="stat-number">💀</div>
                <div class="stat-label">System Armed</div>
            </div>
        </div>

        <!-- Map -->
        <div class="glass-card mb-8">
            <div class="glass-header"><h2>🗺️ Prey Locations</h2></div>
            <div class="p-4">
                <div id="map" class="map-container"></div>
            </div>
        </div>

        <!-- Target Table -->
        <div class="glass-card">
            <div class="glass-header flex items-center justify-between">
                <h2>📋 Execution List</h2>
                <span class="text-red-500 text-xs" id="targetCount">0</span>
            </div>
            <div class="p-4 overflow-x-auto">
                <table>
                    <thead><tr><th>ID</th><th>Prey</th><th>Platform</th><th>Profiles</th><th>Risk</th><th>Created</th><th>Act</th></tr></thead>
                    <tbody id="targetBody"><tr><td colspan="7" class="text-center text-red-700 py-8">No prey yet. Start the hunt.</td></tr></tbody>
                </table>
            </div>
        </div>

        <div class="mt-8 text-center text-red-700 text-xs tracking-widest">☠️ SpectraX – Death Protocol Active ☠️</div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const targetsData = {{ targets|tojson }};
        const tbody = document.getElementById('targetBody');
        if (targetsData && targetsData.length > 0) {
            let html = '', totalRisk = 0;
            targetsData.forEach(t => {
                const osint = t.osint || {};
                const profiles = (osint.sherlock ? Object.keys(osint.sherlock).length : 0) + (osint.maigret ? Object.keys(osint.maigret).length : 0);
                const risk = Math.min(100, profiles * 5);
                totalRisk += risk;
                html += `<tr>
                    <td><strong>${t.id}</strong></td>
                    <td><i class="fas fa-skull"></i> ${t.identifier}</td>
                    <td><span class="badge">${t.platform || 'auto'}</span></td>
                    <td>${profiles}</td>
                    <td><div class="progress"><div class="progress-bar" style="width:${risk}%"></div></div> ${risk}%</td>
                    <td>${t.created_at ? t.created_at.slice(0,10) : 'N/A'}</td>
                    <td><button class="text-red-500 hover:text-red-300" onclick="viewTarget(${t.id})">🔪</button></td>
                </tr>`;
            });
            tbody.innerHTML = html;
            document.getElementById('totalTargets').innerText = targetsData.length;
            document.getElementById('avgRisk').innerText = Math.round(totalRisk / targetsData.length);
            document.getElementById('targetCount').innerText = targetsData.length;
        }

        async function initMap() {
            const resp = await fetch('/api/map_data');
            const markers = await resp.json();
            const map = L.map('map').setView([20, 0], 2);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);
            markers.forEach(m => {
                L.marker([m.lat, m.lon], { icon: L.divIcon({ html: '💀', iconSize: [24, 24] }) })
                    .addTo(map)
                    .bindPopup(`<b>${m.identifier}</b><br>${m.city}, ${m.country}`);
            });
        }
        function viewTarget(id) {
            fetch(`/api/target/${id}`).then(r=>r.json()).then(d=>alert(JSON.stringify(d,null,2))).catch(e=>alert('Error'));
        }
        initMap();
        setInterval(() => location.reload(), 30000);
    </script>
</body>
</html>
