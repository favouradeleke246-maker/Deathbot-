<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpectraX Dashboard</title>
    <!-- Leaflet CSS for map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* 🌟 Auto‑changing theme (Red, Blue, Green) */
        :root {
            --primary: #e74c3c;
            --secondary: #3498db;
            --accent: #2ecc71;
            --bg: #f8f9fa;
            --text: #212529;
        }
        @keyframes themeShift {
            0% { --primary: #e74c3c; --secondary: #3498db; --accent: #2ecc71; }
            33% { --primary: #3498db; --secondary: #2ecc71; --accent: #e74c3c; }
            66% { --primary: #2ecc71; --secondary: #e74c3c; --accent: #3498db; }
            100% { --primary: #e74c3c; --secondary: #3498db; --accent: #2ecc71; }
        }
        body {
            animation: themeShift 12s infinite;
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding-top: 20px;
            transition: all 0.8s ease;
        }
        .card {
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: none;
            transition: all 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }
        .card-header {
            background: var(--primary) !important;
            color: white !important;
            border-radius: 15px 15px 0 0 !important;
            transition: background 0.8s ease;
        }
        .btn-primary {
            background: var(--primary);
            border: none;
            transition: background 0.8s ease;
        }
        .btn-primary:hover {
            background: var(--secondary);
        }
        .btn-success {
            background: var(--accent);
            border: none;
        }
        .btn-success:hover {
            background: var(--primary);
        }
        .badge-primary { background: var(--primary); }
        .badge-success { background: var(--accent); }
        .badge-secondary { background: var(--secondary); }
        .table th {
            background: var(--primary);
            color: white;
        }
        .progress-bar {
            background: var(--primary);
            transition: background 0.8s ease;
        }
        .map-container {
            height: 400px;
            border-radius: 15px;
            overflow: hidden;
            margin-top: 20px;
        }
        .leaflet-container {
            height: 100%;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row mb-4">
            <div class="col-12">
                <div class="card">
                    <div class="card-body">
                        <h1 class="display-6"><i class="fas fa-robot"></i> SpectraX Dashboard</h1>
                        <p class="text-muted">Intelligence at a glance – live targets, geolocation, and stats.</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header">
                        <i class="fas fa-map-marked-alt"></i> Target Locations
                    </div>
                    <div class="card-body">
                        <div id="map" class="map-container"></div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header">
                        <i class="fas fa-chart-line"></i> Quick Stats
                    </div>
                    <div class="card-body">
                        <ul class="list-group list-group-flush">
                            <li class="list-group-item d-flex justify-content-between align-items-center">
                                Total Targets
                                <span class="badge badge-primary rounded-pill" id="totalTargets">0</span>
                            </li>
                            <li class="list-group-item d-flex justify-content-between align-items-center">
                                Average Risk Score
                                <span class="badge badge-success rounded-pill" id="avgRisk">0</span>
                            </li>
                            <li class="list-group-item d-flex justify-content-between align-items-center">
                                System Status
                                <span class="badge badge-secondary rounded-pill">✅ Online</span>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">
                        <i class="fas fa-list"></i> All Targets
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover table-bordered" id="targetTable">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Identifier</th>
                                        <th>Platform</th>
                                        <th>Profiles</th>
                                        <th>Risk</th>
                                        <th>Created</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="targetBody">
                                    <!-- Filled by JS -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>
        // ---------- Load targets and map ----------
        async function loadData() {
            const resp = await fetch('/api/stats');
            const stats = await resp.json();
            document.getElementById('totalTargets').innerText = stats.total_targets;
            // Calculate average risk
            let totalRisk = 0;
            let count = 0;
            // Load targets table
            const tableResp = await fetch('/api/stats');
            const targets = (await tableResp.json()).recent_5 || [];
            // Actually we need full list; we'll fetch all from /api/target?all but we don't have that.
            // Instead we'll use the pre-rendered targets from server – we'll populate with Jinja.
            // For simplicity, we'll embed targets data from server (already passed in render_template).
            // But we can also use the map data endpoint.
            // We'll use map data for markers and also populate table.
            const mapResp = await fetch('/api/map_data');
            const markers = await mapResp.json();
            // Update total targets from stats
            const allTargets = await fetch('/api/stats').then(r => r.json());
            // We'll need to reload page to get full target list – we'll just use server-side rendering for table.
            // For dynamic update, we'll reload page periodically.
        }

        // ---------- Initialize map ----------
        async function initMap() {
            const resp = await fetch('/api/map_data');
            const markers = await resp.json();
            const map = L.map('map').setView([20, 0], 2);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap contributors'
            }).addTo(map);
            markers.forEach(m => {
                L.marker([m.lat, m.lon])
                    .addTo(map)
                    .bindPopup(`<b>${m.identifier}</b><br>${m.city}, ${m.country}`);
            });
            // Also populate table from server-side data (Jinja)
            const tableBody = document.getElementById('targetBody');
            const targets = {{ targets | tojson }};
            if (targets.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="7" class="text-center">No targets yet.</td></tr>`;
            } else {
                targets.forEach(t => {
                    const osint = t.osint || {};
                    const totalProfiles = (osint.sherlock ? Object.keys(osint.sherlock).length : 0) +
                                         (osint.maigret ? Object.keys(osint.maigret).length : 0);
                    const risk = Math.min(100, totalProfiles * 5);
                    const row = `<tr>
                        <td><strong>${t.id}</strong></td>
                        <td><i class="fas fa-user-circle"></i> ${t.identifier}</td>
                        <td><span class="badge badge-secondary">${t.platform || 'auto'}</span></td>
                        <td>${totalProfiles}</td>
                        <td>
                            <div class="progress" style="height:20px;">
                                <div class="progress-bar" role="progressbar" style="width: ${risk}%;" aria-valuenow="${risk}" aria-valuemin="0" aria-valuemax="100">${risk}%</div>
                            </div>
                        </td>
                        <td>${t.created_at ? t.created_at.slice(0,10) : 'N/A'}</td>
                        <td>
                            <button class="btn btn-sm btn-primary" onclick="viewTarget(${t.id})"><i class="fas fa-eye"></i></button>
                        </td>
                    </tr>`;
                    tableBody.innerHTML += row;
                });
            }
            // Update stats
            document.getElementById('totalTargets').innerText = targets.length;
            const totalRisk = targets.reduce((sum, t) => {
                const profiles = (t.osint?.sherlock ? Object.keys(t.osint.sherlock).length : 0) +
                                (t.osint?.maigret ? Object.keys(t.osint.maigret).length : 0);
                return sum + Math.min(100, profiles * 5);
            }, 0);
            const avgRisk = targets.length ? Math.round(totalRisk / targets.length) : 0;
            document.getElementById('avgRisk').innerText = avgRisk;
        }

        function viewTarget(id) {
            fetch(`/api/target/${id}`)
                .then(response => response.json())
                .then(data => alert(JSON.stringify(data, null, 2)))
                .catch(error => alert('Error: ' + error));
        }

        // Auto‑refresh every 30 seconds
        setTimeout(() => location.reload(), 30000);

        // Init when page loads
        window.onload = initMap;
    </script>
</body>
</html>
